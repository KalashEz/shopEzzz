<div class="header">
    <div class="logo">📱 ElectroShop</div>
    <button class="cart-btn" id="openCartBtn">🛒 Корзина (<span id="cartCount">0</span>)</button>
</div>

<div class="container" style="max-width: 1200px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px;">🔥 Наши товары</h2>
    <div class="products-grid" id="productsGrid"></div>
</div>

<!-- модальное окно -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" id="closeModal">&times;</span>
        <h2 id="modalTitle"></h2>
        <div id="modalSpecs" class="specs-full"></div>
        <h3>📝 Отзывы:</h3>
        <div id="modalReviews" class="reviews-list"></div>
        <div class="add-review">
            <input type="text" id="reviewName" placeholder="Ваше имя">
            <select id="reviewRating">
                <option value="5">⭐⭐⭐⭐⭐ 5</option>
                <option value="4">⭐⭐⭐⭐ 4</option>
                <option value="3">⭐⭐⭐ 3</option>
                <option value="2">⭐⭐ 2</option>
                <option value="1">⭐ 1</option>
            </select>
            <textarea id="reviewText" rows="2" placeholder="Ваш отзыв..."></textarea>
            <button id="addReviewBtn">Добавить отзыв</button>
        </div>
        <button id="modalAddToCart" style="margin-top: 15px;">➕ Добавить в корзину</button>
    </div>
</div>

<!-- корзина -->
<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
        <h3>🛒 Корзина</h3>
        <span class="close" id="closeCartBtn" style="font-size: 24px; cursor: pointer;">&times;</span>
    </div>
    <div id="cartItems" class="cart-items">
        <p style="text-align: center; color: #999;">Корзина пуста</p>
    </div>
    <div class="cart-total" id="cartTotal">Итого: 0 ₽</div>
    <button id="checkoutBtn" style="background: #28a745; margin-top: 15px;">✅ Оформить заказ</button>
</div>
<div id="overlay" class="overlay"></div>

<footer>
